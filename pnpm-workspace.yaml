catalogMode: prefer
ignoreWorkspaceRootCheck: true
shellEmulator: true
trustPolicy: no-downgrade

packages:
  - playground
  - docs
  - packages/*
  - examples/*

catalogs:
  cli:
    '@antfu/eslint-config': ^7.7.0
    bumpp: ^10.4.1
    eslint: ^10.0.3
    lint-staged: ^16.3.2
    simple-git-hooks: ^2.13.1
    tsdown: ^0.21.0
    tsx: ^4.21.0
    typescript: ^5.9.3
    vite: ^7.3.1
  testing:
    tinyexec: ^1.0.2
    vitest: ^4.0.18
    vitest-package-exports: ^1.2.0
    yaml: ^2.8.2
onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks
